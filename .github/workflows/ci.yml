name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for restricted files
        run: |
          RESTRICTED_FILES=(".env" ".env.docker" ".env.postgres.local" "dev.db")
          for file in "${RESTRICTED_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "FAIL: $file is tracked in the repository!"
              exit 1
            fi
          done

          RESTRICTED_DIRS=("backups" "node_modules" "dist")
          for dir in "${RESTRICTED_DIRS[@]}"; do
            # Check if directory is tracked by git
            if git ls-tree -r HEAD --name-only | grep -q "^$dir/"; then
              echo "FAIL: $dir directory is tracked in the repository!"
              exit 1
            fi
          done
          echo "PASS: No restricted files tracked."

      - name: Scan for basic secrets
        run: |
          # Exclude .md files to avoid false positives from documentation/release notes.
          PATTERNS=("Bearer[[:space:]]+eyJ" "eyJ" "Admin@123!" "JWT_SECRET=" "DATABASE_URL=postgresql://" "passwordHash")
          for pattern in "${PATTERNS[@]}"; do
            # Use git grep to only scan tracked files, excluding markdown docs
            if git grep -I -E "$pattern" -- ":!*.md" ":!.github/workflows/ci.yml" ":!package-lock.json" ":!legalflow-backend/package-lock.json" >/dev/null 2>&1; then
              echo "Found potential match for '$pattern' in non-markdown files:"
              git grep -I -E "$pattern" -- ":!*.md" ":!.github/workflows/ci.yml" ":!package-lock.json" ":!legalflow-backend/package-lock.json"
              
              # Allowlist passwordHash if it's likely a type or interface field rather than a secret.
              # In a real setup, we might refine the regex. For this UAT CI, we print a warning.
              if [ "$pattern" = "passwordHash" ]; then
                echo "Ignoring passwordHash match as it may be a typescript interface/field definition."
              elif [ "$pattern" = "Admin@123!" ]; then
                BAD_MATCHES=$(git grep -I -E -l "$pattern" -- ":!*.md" ":!.github/workflows/ci.yml" ":!package-lock.json" ":!legalflow-backend/package-lock.json" | grep -E -v '\.example$|legalflow-backend/(test.*|verify-.*|uat-.*|check)\.js$')
                if [ -n "$BAD_MATCHES" ]; then
                  echo "FAIL: Secret pattern '$pattern' found in unauthorized files:"
                  echo "$BAD_MATCHES"
                  exit 1
                else
                  echo "Ignoring '$pattern' match as it only appears in allowed dummy scripts and .example files."
                fi
              elif [ "$pattern" = "JWT_SECRET=" ] || [ "$pattern" = "DATABASE_URL=postgresql://" ]; then
                BAD_MATCHES=$(git grep -I -E -l "$pattern" -- ":!*.md" ":!.github/workflows/ci.yml" ":!package-lock.json" ":!legalflow-backend/package-lock.json" | grep -E -v '\.example$')
                if [ -n "$BAD_MATCHES" ]; then
                  echo "FAIL: Secret pattern '$pattern' found in unauthorized files:"
                  echo "$BAD_MATCHES"
                  exit 1
                else
                  echo "Ignoring '$pattern' match as it only appears in allowed .example files."
                fi
              else
                echo "FAIL: Secret pattern '$pattern' found!"
                exit 1
              fi
            fi
          done
          echo "PASS: No basic secrets found."

  build-frontend:
    name: Build Frontend
    needs: security-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  build-backend:
    name: Build Backend
    needs: security-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legalflow-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: legalflow-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma Validate
        run: npx prisma validate

      - name: Prisma Generate
        run: npx prisma generate

      - name: Build backend
        run: npm run build

  docker-checks:
    name: Docker Configuration & Build Checks
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Compose Configuration
        run: docker compose -f docker-compose.full.yml --env-file .env.docker.example config

      - name: Build Backend Image
        run: docker build -f legalflow-backend/Dockerfile -t legalflow-backend:test legalflow-backend

      - name: Build Frontend Image
        run: docker build -f Dockerfile.frontend -t legalflow-frontend:test .
