version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: legalflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - legalflow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: legalflow_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - legalflow_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: ./legalflow-backend
      dockerfile: Dockerfile
    container_name: legalflow_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      NODE_ENV: production
      HOST: 0.0.0.0
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_REGION: ${MINIO_REGION}
      MINIO_FORCE_PATH_STYLE: ${MINIO_FORCE_PATH_STYLE}
      MINIO_AUTO_CREATE_BUCKET: ${MINIO_AUTO_CREATE_BUCKET}
      METRICS_INTERNAL_TOKEN: ${METRICS_INTERNAL_TOKEN}
    networks:
      - legalflow_network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: legalflow_prometheus
    profiles: ["observability"]
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        echo -n "$${METRICS_INTERNAL_TOKEN}" > /etc/prometheus/token.txt
        exec /bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus --storage.tsdb.retention.time=7d
    environment:
      METRICS_INTERNAL_TOKEN: ${METRICS_INTERNAL_TOKEN}
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - legalflow_network

  grafana:
    image: grafana/grafana:latest
    container_name: legalflow_grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - legalflow_network
    depends_on:
      - prometheus

  frontend_caddy:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: legalflow_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - legalflow_network
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  legalflow_network:
    name: legalflow_network
    driver: bridge
